# TEST — test.classmini580.blog → Next.js :3001
# Install: sudo cp deploy/nginx/test.classmini580.blog.conf /etc/nginx/sites-available/
#          sudo ln -sf /etc/nginx/sites-available/test.classmini580.blog.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name test.classmini580.blog;

    client_max_body_size 110M;

    # Hide LocalDiskBucket sidecars
    location ~ ^/media/.*\.meta\.json$ {
        deny all;
        return 404;
    }

    # Persisted media on host disk (same path bind-mounted into the web container)
    location /media/ {
        alias /opt/mini580/test/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_body_timeout 300s;
    }
}
