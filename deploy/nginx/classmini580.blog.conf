# PROD — classmini580.blog (+ www redirect) → Next.js :3000
# Install: sudo cp deploy/nginx/classmini580.blog.conf /etc/nginx/sites-available/
#          sudo ln -sf /etc/nginx/sites-available/classmini580.blog.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name www.classmini580.blog;
    return 301 http://classmini580.blog$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name classmini580.blog;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
