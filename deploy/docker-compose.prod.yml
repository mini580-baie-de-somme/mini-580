# Stack PROD — isolée (réseau, volumes, DB)
# Usage: IMAGE=ghcr.io/.../mini-580:prod docker compose -f docker-compose.prod.yml --env-file .env up -d

name: mini580-prod

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mini580}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-mini580_prod}
    volumes:
      - mini580_prod_pg:/var/lib/postgresql/data
    networks:
      - mini580_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mini580} -d ${POSTGRES_DB:-mini580_prod}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: ${IMAGE:?IMAGE required}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mini580}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mini580_prod}?schema=public
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET required}
      EDITORS_ALLOWLIST: ${EDITORS_ALLOWLIST:-}
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - mini580_prod

volumes:
  mini580_prod_pg:

networks:
  mini580_prod:
    name: mini580_prod
