# Stack TEST — isolée (réseau, volumes, DB)
# Usage: IMAGE=ghcr.io/.../mini-580:test docker compose -f docker-compose.test.yml --env-file .env up -d

name: mini580-test

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mini580}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-mini580_test}
    volumes:
      - mini580_test_pg:/var/lib/postgresql/data
    networks:
      - mini580_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mini580} -d ${POSTGRES_DB:-mini580_test}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: ${IMAGE:?IMAGE required}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mini580}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mini580_test}?schema=public
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET required}
      EDITORS_ALLOWLIST: ${EDITORS_ALLOWLIST:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@cnbs.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme123}
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - mini580_test

volumes:
  mini580_test_pg:

networks:
  mini580_test:
    name: mini580_test
