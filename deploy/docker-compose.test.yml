# Stack TEST — isolée (réseau, volumes, DB)
# Usage: IMAGE=ghcr.io/.../mini-580:test docker compose -f docker-compose.test.yml --env-file .env up -d

name: mini580-test

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mini580}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-mini580_test}
    volumes:
      - mini580_test_pg:/var/lib/postgresql/data
    networks:
      - mini580_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mini580} -d ${POSTGRES_DB:-mini580_test}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: ${IMAGE:?IMAGE required}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mini580}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mini580_test}?schema=public
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET required}
      EDITORS_ALLOWLIST: ${EDITORS_ALLOWLIST:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@classmini580.blog}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme123}
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      SITE_URL: ${SITE_URL:-https://test.classmini580.blog}
      MEDIA_ROOT: /data/media
      MEDIA_PUBLIC_BASE: /media
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      TELEGRAM_SERVICE_USER_EMAIL: ${TELEGRAM_SERVICE_USER_EMAIL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      CURSOR_MODEL: ${CURSOR_MODEL:-composer-2.5}
      CURSOR_CWD: ${CURSOR_CWD:-/tmp/mini580-cursor}
      SYNC_ENV: ${SYNC_ENV:-test}
      SYNC_PEER_URL: ${SYNC_PEER_URL:-https://classmini580.blog}
      SYNC_PRIVATE_KEY: ${SYNC_PRIVATE_KEY:-}
      SYNC_PEER_PUBLIC_KEY: ${SYNC_PEER_PUBLIC_KEY:-}
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./media:/data/media
    networks:
      - mini580_test

volumes:
  mini580_test_pg:

networks:
  mini580_test:
    name: mini580_test
