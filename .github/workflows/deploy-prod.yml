name: Deploy PROD

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type deploy-prod to confirm'
        required: true
        default: ''
      expected_version:
        description: 'Version validated on TEST (e.g. 1.0.89) — must match test.classmini580.blog/api/version'
        required: true
        default: ''

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mini580-baie-de-somme/mini-580

jobs:
  promote-and-deploy:
    if: github.event.inputs.confirm == 'deploy-prod'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      packages: write
    steps:
      - name: Verify TEST live version
        run: |
          EXPECTED="${{ github.event.inputs.expected_version }}"
          if [ -z "$EXPECTED" ]; then
            echo "::error::expected_version is required (e.g. 1.0.89)"
            exit 1
          fi
          ACTUAL=$(curl -fsS https://test.classmini580.blog/api/version | jq -r .version)
          echo "TEST live: v$ACTUAL — promote target: v$EXPECTED"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::TEST is v$ACTUAL but you asked to promote v$EXPECTED. Deploy or validate TEST first."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote TEST image to PROD (no rebuild)
        run: |
          SOURCE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test"
          TARGET="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod"
          VERSION_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ github.event.inputs.expected_version }}"
          echo "Promoting $SOURCE → $TARGET (+ $VERSION_TAG)"
          docker buildx imagetools create -t "$TARGET" -t "$VERSION_TAG" "$SOURCE"

      - name: Sync PROD deploy configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/docker-compose.prod.yml,deploy/scripts/deploy.sh,deploy/nginx/classmini580.blog.conf"
          target: "/tmp/mini580-deploy-sync"

      - name: Deploy to VPS (PROD)
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ secrets.CURSOR_MODEL }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          TELEGRAM_ALLOWED_USER_IDS: ${{ secrets.TELEGRAM_ALLOWED_USER_IDS }}
          TELEGRAM_SERVICE_USER_EMAIL: ${{ secrets.TELEGRAM_SERVICE_USER_EMAIL }}
          SYNC_PRIVATE_KEY: ${{ secrets.SYNC_PRIVATE_KEY }}
          SYNC_PEER_PUBLIC_KEY: ${{ secrets.SYNC_PEER_PUBLIC_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,CURSOR_API_KEY,CURSOR_MODEL,INGEST_API_KEY,TELEGRAM_BOT_TOKEN,TELEGRAM_WEBHOOK_SECRET,TELEGRAM_ALLOWED_USER_IDS,TELEGRAM_SERVICE_USER_EMAIL,SYNC_PRIVATE_KEY,SYNC_PEER_PUBLIC_KEY,SESSION_SECRET,POSTGRES_PASSWORD
          script: |
            set -euo pipefail
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod"
            SYNC=/tmp/mini580-deploy-sync/deploy
            ENVF=/opt/mini580/prod/.env
            mkdir -p /opt/mini580/prod/media /opt/mini580/nginx /opt/mini580/bin
            cp "$SYNC/docker-compose.prod.yml" /opt/mini580/prod/docker-compose.yml
            cp "$SYNC/scripts/deploy.sh" /opt/mini580/bin/deploy.sh
            chmod +x /opt/mini580/bin/deploy.sh
            cp "$SYNC/nginx/classmini580.blog.conf" /opt/mini580/nginx/classmini580.blog.conf
            upsert_env() {
              local key="$1" val="$2"
              [[ -z "$val" ]] && return 0
              touch "$ENVF"
              grep -v "^${key}=" "$ENVF" > "${ENVF}.tmp" || true
              printf '%s=%s\n' "$key" "$val" >> "${ENVF}.tmp"
              mv "${ENVF}.tmp" "$ENVF"
              chmod 600 "$ENVF"
            }
            upsert_env CURSOR_API_KEY "${CURSOR_API_KEY:-}"
            upsert_env CURSOR_MODEL "${CURSOR_MODEL:-}"
            upsert_env INGEST_API_KEY "${INGEST_API_KEY:-}"
            upsert_env TELEGRAM_BOT_TOKEN "${TELEGRAM_BOT_TOKEN:-}"
            upsert_env TELEGRAM_WEBHOOK_SECRET "${TELEGRAM_WEBHOOK_SECRET:-}"
            upsert_env TELEGRAM_ALLOWED_USER_IDS "${TELEGRAM_ALLOWED_USER_IDS:-}"
            upsert_env TELEGRAM_SERVICE_USER_EMAIL "${TELEGRAM_SERVICE_USER_EMAIL:-}"
            upsert_env SYNC_PRIVATE_KEY "${SYNC_PRIVATE_KEY:-}"
            upsert_env SYNC_PEER_PUBLIC_KEY "${SYNC_PEER_PUBLIC_KEY:-}"
            upsert_env SESSION_SECRET "${SESSION_SECRET:-}"
            upsert_env POSTGRES_PASSWORD "${POSTGRES_PASSWORD:-}"
            if command -v sudo >/dev/null 2>&1; then
              sudo cp /opt/mini580/nginx/classmini580.blog.conf /etc/nginx/sites-available/classmini580.blog.conf || true
              sudo nginx -t && sudo systemctl reload nginx || true
            fi
            mkdir -p /opt/mini580/prod/media
            docker run --rm -v /opt/mini580/prod/media:/data/media alpine:3.20 \
              sh -c 'chown -R 1001:1001 /data/media && chmod -R u+rwX,g+rX,o+rX /data/media'
            ls -lad /opt/mini580/prod/media
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            /opt/mini580/bin/deploy.sh prod "$IMAGE"

      - name: Verify PROD version matches TEST
        run: |
          EXPECTED="${{ github.event.inputs.expected_version }}"
          ok=0
          for i in $(seq 1 30); do
            ACTUAL=$(curl -fsS https://classmini580.blog/api/version | jq -r .version 2>/dev/null || echo "")
            echo "Attempt $i: PROD v$ACTUAL (expected v$EXPECTED)"
            if [ "$ACTUAL" = "$EXPECTED" ]; then
              ok=1
              break
            fi
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::PROD version mismatch — expected v$EXPECTED"
            exit 1
          fi
          echo "PROD promoted OK — v$EXPECTED"
