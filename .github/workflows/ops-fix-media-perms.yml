name: Ops — Fix media permissions

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Stack (test, prod, or both)"
        required: true
        type: choice
        options:
          - both
          - prod
          - test
        default: both

jobs:
  fix-media-perms:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'test' && 'test' || 'prod' }}
    steps:
      - name: chown media dirs to container user 1001
        uses: appleboy/ssh-action@v1.2.0
        env:
          OPS_ENV: ${{ inputs.environment }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 60s
          command_timeout: 5m
          envs: OPS_ENV
          script: |
            set -euo pipefail
            fix_one() {
              local env="$1"
              local dir="/opt/mini580/${env}/media"
              echo "===== ${env} ====="
              mkdir -p "$dir"
              if command -v sudo >/dev/null 2>&1; then
                sudo chown -R 1001:1001 "$dir"
                sudo chmod -R u+rwX,g+rX,o+rX "$dir"
              else
                chown -R 1001:1001 "$dir"
                chmod -R u+rwX,g+rX,o+rX "$dir"
              fi
              ls -lad "$dir"
              # Prove container user can create a year dir
              COMPOSE="/opt/mini580/${env}/docker-compose.yml"
              ENVF="/opt/mini580/${env}/.env"
              if [[ -f "$COMPOSE" && -f "$ENVF" ]]; then
                docker compose -f "$COMPOSE" --env-file "$ENVF" exec -T -u 1001 web \
                  sh -c 'mkdir -p /data/media/_permcheck && rmdir /data/media/_permcheck && echo "write OK as uid 1001"' \
                  || echo "WARNING: write check failed for ${env}"
              fi
            }
            case "${OPS_ENV}" in
              both) fix_one test; fix_one prod ;;
              test|prod) fix_one "$OPS_ENV" ;;
              *) echo "bad env: $OPS_ENV"; exit 1 ;;
            esac
            echo "DONE"
