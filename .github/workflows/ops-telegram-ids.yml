name: Ops — Telegram recent users

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: SSH — docker logs + Telegram getUpdates
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 60s
          command_timeout: 5m
          script: |
            set -uo pipefail
            for env in test prod; do
              echo "===== $env ====="
              ENV_FILE="/opt/mini580/$env/.env"
              if [[ ! -f "$ENV_FILE" ]]; then
                echo "missing $ENV_FILE"
                continue
              fi
              ALLOWED=$(grep -E '^TELEGRAM_ALLOWED_USER_IDS=' "$ENV_FILE" | cut -d= -f2- || true)
              echo "TELEGRAM_ALLOWED_USER_IDS=${ALLOWED:-<empty>}"
              TOKEN=$(grep -E '^TELEGRAM_BOT_TOKEN=' "$ENV_FILE" | cut -d= -f2- | tr -d '"')
              if [[ -n "$TOKEN" ]]; then
                curl -fsS "https://api.telegram.org/bot${TOKEN}/getMe" || true
                echo
                curl -fsS "https://api.telegram.org/bot${TOKEN}/getUpdates?limit=20" || echo "getUpdates failed (webhook active?)"
                echo
              fi
              COMPOSE="/opt/mini580/$env/docker-compose.yml"
              if [[ -f "$COMPOSE" ]]; then
                docker compose -f "$COMPOSE" --env-file "$ENV_FILE" logs web --since 3h 2>&1 | tail -120 || true
                docker compose -f "$COMPOSE" --env-file "$ENV_FILE" exec -T db \
                  psql -U postgres -d mini580 -c \
                  'SELECT "telegramUserId", "telegramChatId", "updatedAt" FROM "TelegramAgentThread" ORDER BY "updatedAt" DESC LIMIT 10;' 2>/dev/null || true
              fi
            done
