name: Deploy TEST

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-test
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mini580-baie-de-somme/mini-580

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=test
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync TEST deploy configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/docker-compose.test.yml,deploy/scripts/deploy.sh,deploy/nginx/test.classmini580.blog.conf"
          target: "/tmp/mini580-deploy-sync"

      - name: Deploy to VPS (TEST)
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,CURSOR_API_KEY,INGEST_API_KEY
          script: |
            set -euo pipefail
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test"
            SYNC=/tmp/mini580-deploy-sync/deploy
            ENVF=/opt/mini580/test/.env
            mkdir -p /opt/mini580/test/media /opt/mini580/nginx /opt/mini580/bin
            cp "$SYNC/docker-compose.test.yml" /opt/mini580/test/docker-compose.yml
            cp "$SYNC/scripts/deploy.sh" /opt/mini580/bin/deploy.sh
            chmod +x /opt/mini580/bin/deploy.sh
            cp "$SYNC/nginx/test.classmini580.blog.conf" /opt/mini580/nginx/test.classmini580.blog.conf
            # Merge AI / ingest secrets into .env without printing values
            upsert_env() {
              local key="$1" val="$2"
              [[ -z "$val" ]] && return 0
              if grep -q "^${key}=" "$ENVF" 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" "$ENVF"
              else
                echo "${key}=${val}" >> "$ENVF"
              fi
            }
            upsert_env CURSOR_API_KEY "${CURSOR_API_KEY:-}"
            upsert_env INGEST_API_KEY "${INGEST_API_KEY:-}"
            if command -v sudo >/dev/null 2>&1; then
              sudo cp /opt/mini580/nginx/test.classmini580.blog.conf /etc/nginx/sites-available/test.classmini580.blog.conf || true
              sudo nginx -t && sudo systemctl reload nginx || true
              sudo chown -R 1001:1001 /opt/mini580/test/media || true
            fi
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            /opt/mini580/bin/deploy.sh test "$IMAGE"
