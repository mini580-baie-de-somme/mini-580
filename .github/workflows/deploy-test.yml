name: Deploy TEST

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "deploy/**"
  workflow_dispatch:
    inputs:
      redeploy_version:
        description: "Redeploy existing GHCR tag (e.g. 1.0.89) without rebuild — leave empty to build from main"
        required: false
        default: ""

concurrency:
  group: deploy-test
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mini580-baie-de-somme/mini-580

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve deploy version
        id: ver
        working-directory: web
        run: |
          REDEPLOY="${{ github.event.inputs.redeploy_version }}"
          if [ -n "$REDEPLOY" ]; then
            echo "version=$REDEPLOY" >> "$GITHUB_OUTPUT"
            echo "mode=redeploy" >> "$GITHUB_OUTPUT"
            echo "Redeploy v$REDEPLOY (no rebuild)"
          else
            VERSION=$(node scripts/increment-build-counter.mjs)
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "mode=build" >> "$GITHUB_OUTPUT"
            echo "Build version: v$VERSION (tag v$VERSION + :test)"
          fi

      - name: Persist build counter
        if: steps.ver.outputs.mode == 'build'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build-counter.json
          if git diff --staged --quiet; then
            echo "build-counter.json unchanged"
          else
            git commit -m "chore(ci): record build counter for v${{ steps.ver.outputs.version }}"
            git push
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.ver.outputs.mode == 'build'
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BUILD_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify redeploy tag exists
        if: steps.ver.outputs.mode == 'redeploy'
        run: |
          TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.ver.outputs.version }}"
          docker buildx imagetools inspect "$TAG" >/dev/null
          echo "Found $TAG"

      - name: Retag :test to redeployed version
        if: steps.ver.outputs.mode == 'redeploy'
        run: |
          SOURCE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.ver.outputs.version }}"
          TARGET="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test"
          docker buildx imagetools create -t "$TARGET" "$SOURCE"

      - name: Sync TEST deploy configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/docker-compose.test.yml,deploy/scripts/deploy.sh,deploy/nginx/test.classmini580.blog.conf"
          target: "/tmp/mini580-deploy-sync"

      - name: Deploy to VPS (TEST)
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ secrets.CURSOR_MODEL }}
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
          TELEGRAM_ALLOWED_USER_IDS: ${{ secrets.TELEGRAM_ALLOWED_USER_IDS }}
          TELEGRAM_SERVICE_USER_EMAIL: ${{ secrets.TELEGRAM_SERVICE_USER_EMAIL }}
          SYNC_PRIVATE_KEY: ${{ secrets.SYNC_PRIVATE_KEY }}
          SYNC_PEER_PUBLIC_KEY: ${{ secrets.SYNC_PEER_PUBLIC_KEY }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,CURSOR_API_KEY,CURSOR_MODEL,INGEST_API_KEY,TELEGRAM_BOT_TOKEN,TELEGRAM_WEBHOOK_SECRET,TELEGRAM_ALLOWED_USER_IDS,TELEGRAM_SERVICE_USER_EMAIL,SYNC_PRIVATE_KEY,SYNC_PEER_PUBLIC_KEY,SESSION_SECRET,POSTGRES_PASSWORD
          script: |
            set -euo pipefail
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.ver.outputs.version }}"
            SYNC=/tmp/mini580-deploy-sync/deploy
            ENVF=/opt/mini580/test/.env
            mkdir -p /opt/mini580/test/media /opt/mini580/nginx /opt/mini580/bin
            cp "$SYNC/docker-compose.test.yml" /opt/mini580/test/docker-compose.yml
            cp "$SYNC/scripts/deploy.sh" /opt/mini580/bin/deploy.sh
            chmod +x /opt/mini580/bin/deploy.sh
            cp "$SYNC/nginx/test.classmini580.blog.conf" /opt/mini580/nginx/test.classmini580.blog.conf
            upsert_env() {
              local key="$1" val="$2"
              [[ -z "$val" ]] && return 0
              touch "$ENVF"
              grep -v "^${key}=" "$ENVF" > "${ENVF}.tmp" || true
              printf '%s=%s\n' "$key" "$val" >> "${ENVF}.tmp"
              mv "${ENVF}.tmp" "$ENVF"
              chmod 600 "$ENVF"
            }
            upsert_env CURSOR_API_KEY "${CURSOR_API_KEY:-}"
            upsert_env CURSOR_MODEL "${CURSOR_MODEL:-}"
            upsert_env INGEST_API_KEY "${INGEST_API_KEY:-}"
            upsert_env TELEGRAM_BOT_TOKEN "${TELEGRAM_BOT_TOKEN:-}"
            upsert_env TELEGRAM_WEBHOOK_SECRET "${TELEGRAM_WEBHOOK_SECRET:-}"
            upsert_env TELEGRAM_ALLOWED_USER_IDS "${TELEGRAM_ALLOWED_USER_IDS:-}"
            upsert_env TELEGRAM_SERVICE_USER_EMAIL "${TELEGRAM_SERVICE_USER_EMAIL:-}"
            upsert_env SYNC_PRIVATE_KEY "${SYNC_PRIVATE_KEY:-}"
            upsert_env SYNC_PEER_PUBLIC_KEY "${SYNC_PEER_PUBLIC_KEY:-}"
            upsert_env SESSION_SECRET "${SESSION_SECRET:-}"
            upsert_env POSTGRES_PASSWORD "${POSTGRES_PASSWORD:-}"
            if command -v sudo >/dev/null 2>&1; then
              sudo cp /opt/mini580/nginx/test.classmini580.blog.conf /etc/nginx/sites-available/test.classmini580.blog.conf || true
              sudo nginx -t && sudo systemctl reload nginx || true
            fi
            mkdir -p /opt/mini580/test/media
            docker run --rm -v /opt/mini580/test/media:/data/media alpine:3.20 \
              sh -c 'chown -R 1001:1001 /data/media && chmod -R u+rwX,g+rX,o+rX /data/media'
            ls -lad /opt/mini580/test/media
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            /opt/mini580/bin/deploy.sh test "$IMAGE"

      - name: Verify TEST version
        run: |
          EXPECTED="${{ steps.ver.outputs.version }}"
          ACTUAL=$(curl -fsS https://test.classmini580.blog/api/version | jq -r .version)
          echo "Expected v$EXPECTED, live v$ACTUAL"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::TEST version mismatch after deploy"
            exit 1
          fi
